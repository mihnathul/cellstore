name: ci

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check celljar/ examples/ tests/ apps/

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"
      - name: Verify imports are declared in package metadata
        run: deptry .

  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install jsonschema
        run: pip install jsonschema
      - name: Parse schemas
        run: python -c "import json, glob; [json.load(open(p)) for p in glob.glob('schemas/*.json')]; print('schemas parse OK')"
      - name: Validate schemas are Draft 2020-12
        run: |
          python - <<'EOF'
          import glob, json
          from jsonschema import Draft202012Validator
          paths = sorted(glob.glob("schemas/*.json"))
          if not paths:
              raise SystemExit("no schemas found under schemas/")
          for p in paths:
              with open(p) as f:
                  schema = json.load(f)
              Draft202012Validator.check_schema(schema)
              print(f"OK: {p}")
          EOF

  build:
    # Builds sdist + wheel to catch packaging regressions before publish.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build
        run: pip install build
      - name: Build sdist + wheel
        run: python -m build
      - name: List artifacts
        run: ls -la dist/
